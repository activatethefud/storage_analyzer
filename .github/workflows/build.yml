name: Build Standalone Executables

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[build]
          pip install pyinstaller

      - name: Build Linux executable
        run: |
          pyinstaller --onefile --name storage-analyzer-linux storage_analyzer/main.py
        working-directory: .

      - name: Make executable
        run: chmod +x dist/storage-analyzer-linux

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: storage-analyzer-linux
          path: dist/storage-analyzer-linux
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[build]
          pip install pyinstaller

      - name: Build Windows executable
        run: |
          pyinstaller --onefile --name storage-analyzer-windows storage_analyzer/main.py
        working-directory: .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: storage-analyzer-windows
          path: dist/storage-analyzer-windows.exe
          retention-days: 30

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[build]
          pip install pyinstaller

      - name: Build macOS executable
        run: |
          pyinstaller --onefile --name storage-analyzer-macos storage_analyzer/main.py
        working-directory: .

      - name: Make executable
        run: chmod +x dist/storage-analyzer-macos

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: storage-analyzer-macos
          path: dist/storage-analyzer-macos
          retention-days: 30

  create-release:
    needs: [build-linux, build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}